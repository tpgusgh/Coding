<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나누기</title>
</head>
<body>
    <h1 style="text-align: center;">계산기</h1>
    <input id="go" style="position: absolute; left: 37%;" type="number" placeholder="나눠질 수">
    <input id="save" type="number" style="position: absolute; left: 48%;" placeholder="나눌 수">
    <button style="position: absolute; left: 60%;"  onclick="button()  ">출력</button>
    
    <section id="section" style="position: absolute; left: 45%; top: 17%;" >
    <p id="remember"></p>

   </section>
    <script>
        let number = 1;
        function button(){
            let b = document.getElementById('save').value;
            let a = document.getElementById('go').value;
            let result = document.getElementById('result');
            
            let remember = document.getElementById('remember');
            document.querySelector('section').innerHTML +="<p id='remember'>"+ Number(number) + ". " + Number(a) / Number(b) +  "개"  + "</p>";
            number++;
            
        }
    </script>
</body>
</html>
